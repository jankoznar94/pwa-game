<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>Dungeon Recall</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== NAVIGATION ===== -->
<nav class="nav-bar">
  <a href="#" data-screen="bossSelect" class="active">🗺️ Bossové</a>
  <a href="#" data-screen="reset">🔄 Reset</a>
</nav>

<!-- ===== BOSS SELECT ===== -->
<div id="bossSelect" class="container">
  <div class="card">
    <div class="card-title">👹 Vyber bosse</div>
    <div class="card-subtitle" id="statsLine">🏆 0 výher · 💀 0 proher</div>
  </div>
  <div id="bossList"></div>
</div>

<!-- ===== BATTLE ===== -->
<div id="battleScreen" class="container">
  <div class="card">
    <!-- Boss info -->
    <div class="flex-between">
      <span class="text-green" id="bossName">Boss</span>
      <span id="gameTypeBadge" class="boss-type-badge simon">🧠 Simon</span>
    </div>
    <div class="flex-between" style="margin-top:6px">
      <span id="roundNum">Kolo 1</span>
    </div>

    <!-- HP -->
    <div class="flex-between" style="margin-top:8px">
      <span id="playerHearts">❤️❤️❤️</span><span id="playerHeartsLost"></span>
      <span id="bossHpHearts">❤️❤️</span><span id="bossHpMax"></span>
    </div>

    <!-- Boss face -->
    <div class="enemy-face" id="bossFace">👹</div>
    <div class="enemy-name" id="bossName2"></div>

    <!-- ===== SIMON SAYS ===== -->
    <div id="simonArea" class="minigame-hide">
      <div class="card-subtitle text-center mt-10" id="simonPrompt">Zapamatuj si sekvenci!</div>
      <div class="simon-grid" id="simonGrid"></div>
      <div class="text-center">
        <span id="simonProgress" style="font-size:13px;color:#8888aa">0/3</span>
      </div>
    </div>

    <!-- ===== COLOR CLASH ===== -->
    <div id="colorClashArea" class="minigame-hide">
      <div class="card-subtitle text-center mt-10">Ťukni na správnou barvu!</div>
      <div class="color-clash-area" id="colorArena"></div>
    </div>

    <!-- ===== GRID DEFENDER ===== -->
    <div id="gridDefenderArea" class="minigame-hide">
      <div class="card-subtitle text-center mt-10">Najdi správný příklad!</div>
      <div class="grid-defender-area" id="gridArea"></div>
    </div>
  </div>

  <!-- ===== COUNTDOWN OVERLAY ===== -->
  <div id="countdownOverlay" class="countdown-overlay hidden">
    <div class="countdown-number" id="countdownNumber">3</div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="resultScreen" class="hidden">
  <div class="result-screen container">
    <div class="result-icon" id="resultIcon">💀</div>
    <div class="result-title" id="resultTitle">Padl jsi</div>
    <div class="result-sub" id="resultMsg"></div>
    <div id="resultBtn" class="mt-10"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
