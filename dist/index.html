<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <link rel="manifest" href="manifest.json" />
  <title>Boss Slayer v2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Menu -->
    <div id="menu" class="screen">
      <h1>🚀 Boss Slayer 🚀</h1>
      <div class="stats-row">💰 <span id="menuMoney">0</span></div>
      <button class="btn-main" onclick="game.start()">Hrát</button>
      <button class="btn-sec" onclick="game.openShop()">🛒 Obchod</button>
      <p class="boss-count" id="menuBossCount">Boss #1</p>
    </div>

    <!-- Hra -->
    <div id="game" class="screen hidden">
      <div id="hud">
        <div class="boss-hp-header" id="bossHpHeader">
          <span id="bossNameHud" class="boss-hud-name">Boss</span>
          <div class="boss-hp-outside"><div id="bossHpOutside" class="boss-hp-fill"></div></div>
        </div>
        <div id="waveInfo" class="wave-info">Boss #1</div>
      </div>

      <canvas id="arena" width="400" height="500"></canvas>

      <div id="bottomInfo">
        <span>💰 <span id="gameMoney">0</span></span>
        <span>🔥 <span id="gameCombo">0</span></span>
      </div>
    </div>

    <!-- Výběr dočasného upgradu -->
    <div id="pickup" class="screen hidden">
      <h2>⚡ Vylepšení ⚡</h2>
      <p class="pickup-sub">Vyber si jedno dočasné vylepšení (jen do konce runu)</p>
      <div id="pickupItems"></div>
    </div>

    <!-- Konec -->
    <div id="result" class="screen hidden">
      <h1 id="resultTitle"></h1>
      <p id="resultMsg"></p>
      <p id="resultMoney" class="result-money"></p>
      <button class="btn-main" onclick="game.restart()">Hrát znovu</button>
      <button class="btn-sec" onclick="game.quit()">Menu</button>
    </div>

    <!-- Obchod -->
    <div id="shop" class="screen hidden">
      <h2>🛒 Obchod</h2>
      <p class="shop-money">💰 <span id="shopMoney">0</span></p>
      <div id="shopItems"></div>
      <button class="btn-sec" onclick="game.closeShop()">Zpět</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
