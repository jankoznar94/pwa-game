<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Boss Boj</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Menu obrazovka -->
    <div id="menu" class="screen">
      <h1>⚔ Boss Boj ⚔</h1>
      <button class="btn-main" onclick="game.start()">Hrát</button>
    </div>

    <!-- Herní obrazovka -->
    <div id="game" class="screen hidden">
      <div id="hud">
        <div class="hp-row">
          <div class="hp-bar-wrap">
            <span class="hp-label">Boss</span>
            <div class="hp-bar"><div id="bossHp" class="hp-fill boss-hp"></div></div>
            <span id="bossHpText" class="hp-text">200</span>
          </div>
        </div>
        <div class="hp-row">
          <div class="hp-bar-wrap">
            <span class="hp-label">Ty</span>
            <div class="hp-bar"><div id="playerHp" class="hp-fill player-hp"></div></div>
            <span id="playerHpText" class="hp-text">100</span>
          </div>
        </div>
        <div id="phaseDisplay" class="phase-info"></div>
      </div>

      <canvas id="arena" width="400" height="300"></canvas>

      <div id="log">
        <div id="logContent"></div>
      </div>

      <div id="actions">
        <button id="btnAttack" class="btn-action btn-attack" onclick="game.attack()">⚔ Útok</button>
        <button id="btnHeal" class="btn-action btn-heal" onclick="game.heal()">💚 Léčení</button>
        <button id="btnDodge" class="btn-action btn-dodge" onclick="game.dodge()">💨 Uhnutí</button>
      </div>

      <button class="btn-back" onclick="game.quit()">✕ Zpět</button>
    </div>

    <!-- Konec hry -->
    <div id="result" class="screen hidden">
      <h1 id="resultTitle"></h1>
      <p id="resultMsg"></p>
      <button class="btn-main" onclick="game.restart()">Hrát znovu</button>
      <button class="btn-sec" onclick="game.quit()">Menu</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
